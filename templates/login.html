{% extends "base.html" %}
{% block title %}Login - IPL Auction{% endblock %}
{% block extra_css %}
<style>
.auth-page {
    min-height: calc(100vh - 64px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
}

.auth-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%; max-width: 420px;
    backdrop-filter: blur(20px);
}

.auth-logo {
    text-align: center; margin-bottom: 2rem;
}

.auth-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--gold), #FFA500);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif;
    font-size: 20px; font-weight: 900;
    color: var(--blue-deep);
    margin: 0 auto 1rem;
}

.auth-title { font-family:'Rajdhani',sans-serif; font-size:28px; font-weight:700; }
.auth-subtitle { font-size:13px; color:var(--text-dim); margin-top:4px; }

.form-group { margin-bottom: 16px; }

.form-label {
    display: block;
    font-size: 11px; font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 6px;
}

.form-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}

.form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.08); }

.form-input::placeholder { color: rgba(255,255,255,0.25); }

.auth-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--gold), #FFA500);
    border: none;
    border-radius: 8px;
    color: var(--blue-deep);
    font-family: 'Exo 2', sans-serif;
    font-size: 15px; font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 1px;
}

.auth-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,215,0,0.3); }

.auth-footer { text-align: center; margin-top: 1.5rem; font-size: 13px; color: var(--text-dim); }
.auth-footer a { color: var(--gold); text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }

.divider { position:relative; text-align:center; margin: 1.5rem 0; }
.divider::before { content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:var(--border); }
.divider span { position:relative; background:var(--card-bg); padding:0 12px; font-size:12px; color:var(--text-dim); }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-icon">IPL</div>
            <div class="auth-title">Welcome Back</div>
            <div class="auth-subtitle">Login to your auction account</div>
        </div>

        <form method="POST" action="/login">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-input" required placeholder="Enter username" autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-input" required placeholder="Enter password">
            </div>
            <button type="submit" class="auth-submit">LOGIN TO BID</button>
        </form>

        <div class="divider"><span>Don't have an account?</span></div>

        <div class="auth-footer">
            <a href="/register">Create an account →</a>
        </div>

        <div style="margin-top:1.5rem;padding:12px;background:rgba(255,215,0,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:8px;font-size:12px;color:var(--text-dim);text-align:center">
            <div style="color:var(--gold);font-weight:700;margin-bottom:4px">Demo Admin</div>
            Username: <strong style="color:var(--text)">admin</strong> · Password: <strong style="color:var(--text)">admin123</strong>
        </div>
    </div>
</div>
{% endblock %}
